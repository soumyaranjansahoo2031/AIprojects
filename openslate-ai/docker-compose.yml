services:
  postgres:
    image: postgres:16
    container_name: openslate-postgres
    environment:
      POSTGRES_USER: openslate
      POSTGRES_PASSWORD: openslate123
      POSTGRES_DB: openslate_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: openslate-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: openslate-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: openslate
      MINIO_ROOT_PASSWORD: openslate123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  qdrant_data:
  minio_data: